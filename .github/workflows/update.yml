name: Update Leaderboard and Results

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # In case you fetch from a real API in the future:
          # pip install requests
          # (For now, aggiorna_dati.py only uses the built-in json, os, and sys modules)

      - name: Run calculation script
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python aggiorna_dati.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add classifica.json partite.json
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "Nessuna modifica rilevata."
          else
            git commit -m "Auto-update: Classifica e Partite [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
          fi
